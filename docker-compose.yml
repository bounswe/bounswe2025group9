version: '3.3'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=0
      - DJANGO_SETTINGS_MODULE=nutrihub.settings
      - DATABASE_URL=mysql://nutrihub:nutrihub@db:3306/nutrihub
    depends_on:
      - db
    volumes:
      - ./backend:/project
    networks:
      - nutrihub-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - nutrihub-network

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=nutrihub
      - MYSQL_USER=nutrihub
      - MYSQL_PASSWORD=nutrihub
      - MYSQL_ROOT_PASSWORD=rootpassword
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - nutrihub-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - nutrihub-network

volumes:
  mysql_data:

networks:
  nutrihub-network:
    driver: bridge 
